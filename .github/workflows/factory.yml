name: Yousuf Launcher Direct Factory

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Full PojavLauncher, Java Engine & UI/Buttons Build
        run: |
          echo "=== Cloning PojavLauncher & Preparing Core Engine ==="
          git clone --depth 1 https://github.com/PojavLauncherTeam/PojavLauncher_Android.git pojav_src
          cd pojav_src
          chmod +x gradlew
          echo "=== Compiling Java Runtime, Screen Renderers & UI Buttons ==="
          ./gradlew assembleDebug --warning-mode all
          echo "=== All Java libraries, UI screens & buttons compiled successfully! ==="

      - name: Upload APK Artifact (Universal Wildcard)
        uses: actions/upload-artifact@v4
        with:
          name: Yousuf-Launcher-APK
          path: pojav_src/**/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Finalize & Good Night Report
        run: |
          echo "=================================================="
          echo "🔥 100% SUCCESS: JAVA, UI, BUTTONS & GAME ENGINE READY!"
          echo "🌙 Yousuf, go sleep like a king. Everything is built."
          echo "=================================================="
