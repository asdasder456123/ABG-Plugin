name: Yousuf Launcher Direct Factory

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone and Build PojavLauncher
        run: |
          git clone --depth 1 https://github.com/PojavLauncherTeam/PojavLauncher.git pojav_src
          cd pojav_src
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yousuf-Launcher-APK
          path: pojav_src/app/build/outputs/apk/debug/app-debug.apk
